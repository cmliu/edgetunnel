name: Upstream Sync & Obfuscate

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: # 支持手动强行混淆

jobs:
  sync_and_obfuscate:
    name: Sync, Obfuscate and Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 
          token: ${{ secrets.MY_PERSONAL_TOKEN }}

      - name: Sync upstream changes
        id: sync
        uses: aormsby/fork-sync-with-upstream-action@v3.4.3
        with:
          upstream_sync_repo: cmliu/edgetunnel
          upstream_sync_branch: main
          target_sync_branch: main
          target_repo_token: ${{ secrets.MY_PERSONAL_TOKEN }}
          test_mode: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JavaScript Obfuscator
        run: npm install -g javascript-obfuscator

      # 🟢 修正参数：把原本不支持的 'hex' 一键修正为合法的 'base64' 
      - name: Obfuscate Code
        run: |
          javascript-obfuscator _worker.js --output _worker.js --compact true --simplify true --target node --control-flow-flattening 0 --string-array true --string-array-encoding 'base64'

      - name: Commit
