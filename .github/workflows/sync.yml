name: Upstream Sync & Obfuscate

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *" # 每天凌晨自动追新
  workflow_dispatch: # 支持你手动点按钮更新

jobs:
  sync_and_obfuscate:
    name: Sync, Obfuscate and Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.MY_PERSONAL_TOKEN }} # 使用你的超级特权特许进入

      - name: Sync upstream changes
        id: sync
        uses: aormsby/fork-sync-with-upstream-action@v3.4.3
        with:
          upstream_sync_repo: cmliu/edgetunnel
          upstream_sync_branch: main
          target_sync_branch: main
          target_repo_token: ${{ secrets.MY_PERSONAL_TOKEN }} # 强行冲破同步保护
          test_mode: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JavaScript Obfuscator
        run: npm install -g javascript-obfuscator

      - name: Obfuscate Code
        run: |
          javascript-obfuscator _worker.js --output _worker.js --compact true --simplify true --target node --control-flow-flattening 0 --string-array true --string-array-encoding 'hex'

      - name: Commit Obfuscated Code
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add _worker.js
          git diff-index --quiet HEAD || git commit -m "🤖 自动同步最新源码并完成独立高强度混淆"
          
          # 用特权 Token 组合成超级 URL，强行突破权限壁垒直接往里砸
          git push https://${{ secrets.MY_PERSONAL_TOKEN }}@github.com/${{ github.repository }}.git main --force
