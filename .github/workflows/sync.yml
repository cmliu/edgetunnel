name: Upstream Sync & Obfuscate

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *" # 每天凌晨自动追新并混淆
  workflow_dispatch: # 支持你随时进网页手动点按钮更新

jobs:
  sync_and_obfuscate:
    name: Sync, Obfuscate and Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      # 第一步：把拉取你当前的个人仓库代码到 GitHub 服务器上
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史，防止提交冲突

      # 第二步：自动去捞 CMLiu 大佬的最热、最满血新代码
      - name: Sync upstream changes
        id: sync
        uses: aormsby/fork-sync-with-upstream-action@v3.4.3
        with:
          upstream_sync_repo: cmliu/edgetunnel
          upstream_sync_branch: main
          target_sync_branch: main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          test_mode: false

      # 第三步：配置 Node.js 环境（这是在 GitHub 虚拟电脑上安装跑混淆器所必须的底座）
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 第四步：全自动给 GitHub 虚拟电脑安装全球最强的前端混淆工具
      - name: Install JavaScript Obfuscator
        run: npm install -g javascript-obfuscator

      # 第五步：硬核时刻！用我们测出来的“433M 战神不限速参数”自动给代码套壳搅碎
      - name: Obfuscate Code
        run: |
          javascript-obfuscator _worker.js --output _worker.js --compact true --simplify true --target node --control-flow-flattening 0 --string-array true --string-array-encoding 'hex'

      # 第六步：把混淆加密后彻底变成乱码的天书代码，自动提交覆盖回你的 GitHub
      - name: Commit Obfuscated Code
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add _worker.js
          git diff-index --quiet HEAD || git commit -m "🤖 自动同步最新源码并完成独立高强度混淆"
          git push origin main
